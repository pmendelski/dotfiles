# Miscalenious
# ============
# Make Ctrl combination work
# See: http://superuser.com/a/402084
set-window-option -g xterm-keys on
# More like vim
setw -g mode-keys vi
# emacs key bindings in tmux command prompt (prefix + :) are better than
# vi keys,even for vim users
set -g status-keys emacs

# Mouse
# =====
# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Config
# ======
# Reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf \; display "Reloaded tmux config"

# Copy mode
# =========
# Enable Ctrl + arrows in copy mode-keys
bind -T copy-mode-vi C-Left send-keys -X previous-word
bind -T copy-mode-vi C-Right send-keys -X next-word
# Copy mouse selection to system clipboard
# bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Scroll
# =====
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n Pageup if-shell "$is_vim" "send-keys Pageup" "copy-mode -u"
bind -n Pagedown if-shell "$is_vim" "send-keys Pagedown" "copy-mode -d"
bind -n S-Up if-shell "$is_vim" "send-keys up" "copy-mode; send-keys C-Up"
bind -n S-Down if-shell "$is_vim" "send-keys down" "copy-mode; send-keys C-Down"

# Zen mode
# ========
# Toggle pane full screen and status line
# (similar to 'z' but with status toggle)
bind Z resize-pane -Z \; set status

# Scratch sessions
# ================
# Per-window scratch terminal: one _scratch session, one window per outer window (named w<wid>)
# #{session_name} = "_scratch" when inside → detach-client closes popup, session persists
bind-key -T root F2 run-shell "$HOME/.bash/scripts/tmux-scratch toggle '#{window_id}' '#{pane_current_path}' '#{session_name}'"
bind-key -T scratch F2 run-shell "$HOME/.bash/scripts/tmux-scratch toggle '#{window_id}' '#{pane_current_path}' '#{session_name}'"
# GC orphaned scratch windows when outer windows/sessions are removed
set-hook -g window-unlinked "run-shell '$HOME/.bash/scripts/tmux-scratch gc'"
set-hook -g session-closed  "run-shell '$HOME/.bash/scripts/tmux-scratch gc'"
# bind 1 run-shell "TMUX_SCRATCH=$TMUX_SCRATCH $HOME/.bash/scripts/tmux-scratch toggle dotfiles '\${EDITOR:-vim} ~/.dotfiles'"
# bind 2 run-shell "TMUX_SCRATCH=$TMUX_SCRATCH $HOME/.bash/scripts/tmux-scratch toggle notes '\${EDITOR:-vim} \$NOTES'"

# Server
# ========
# Kill server
bind X confirm kill-server

# Sessions
# ========
# New session
bind S command-prompt -p "New Session:" "new-session -A -s '%%'"
# Kill session
bind K confirm kill-session
# Switch session (hide _ sessions)
bind s choose-session -Z -f '#{!=:#{=1:session_name},_}'

# Windows
# =======
# Preserve path in new window
bind C command-prompt -p "New Window:" "new-window -n '%%'"
# Skip confirmation
bind & kill-window
# Move window left/right
bind P swap-window -t -1\; select-window -t -1
bind N swap-window -t +1\; select-window -t +1
# Improved reorder
bind . command-prompt -p "Move to index:" "run-shell '~/.tmux/scripts/tmux-mv-win.sh %%'"
# Quick access by index
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Pane history
# ============
# Browser-style back/forward navigation across all sessions
set-hook -g after-select-pane "run-shell '$HOME/.bash/scripts/tmux-history push #{pane_id}'"
bind -n 'M-[' run-shell "$HOME/.bash/scripts/tmux-history back"
bind -n 'M-]' run-shell "$HOME/.bash/scripts/tmux-history forward"

# Panes
# =====
# Preserve path on split
bind % split-window -h -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'
# Skip confirmation
bind x kill-pane
# Switch panes using Alt-Arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D
# Synchronize all panes in a window
bind _ setw synchronize-panes\; display "Toggle pane synchronization"
# Swap panes in window
# bind -n C-S-Up swap-pane -t '{up-of}'
# bind -n C-S-Down swap-pane -t '{down-of}'
# bind -n C-S-Left swap-pane -t '{left-of}'
# bind -n C-S-Right swap-pane -t '{right-of}'

bind g display-popup -T "lazygit" -w 95% -h 95% -d "#{pane_current_path}" -E "/usr/local/bin/lazygit"

bind F display-popup -T "Switch session" -E "tmux list-windows -aF '#{session_name}:#{window_index} #{window_name}' | grep -v '^_' | ~/.fzf/bin/fzf --reverse --preview 'tmux capture-pane -ep -t {1}' --preview-window=right:60% | cut -d ' ' -f1 | xargs -r tmux switch-client -t"
bind f display-popup -T "Switch windows" -E "tmux list-windows -F '#{window_index} #{window_name}' | ~/.fzf/bin/fzf --reverse --preview 'tmux capture-pane -ep -t :{1}' --preview-window=right:60% | cut -d ' ' -f1 | xargs -r tmux select-window -t"
bind a display-popup -T "AI panes" -w 90% -h 90% -E "$HOME/.bash/scripts/tmux-claude-panes"
bind A run-shell "$HOME/.bash/scripts/tmux-claude-panes --jump"
